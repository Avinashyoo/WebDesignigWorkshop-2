 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 6: DOM Manipulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="mainContainer">
        <h1 id="heading">Welcome to JavaScript Lab</h1>

        <div class="input-section">
            <input type="text" id="userInput" placeholder="Enter new heading text">
        </div>

        <div class="button-group">
            <button id="btnChangeHeading">Change Heading</button>
            <button id="btnChangeBg">Change Background</button>
            <button id="btnIncreaseFont">Increase Font Size</button>
            <button id="btnTogglePara">Show/Hide Paragraph</button>
            <button id="btnReset">Reset</button>
        </div>

        <p id="paragraph">This is a sample paragraph. JavaScript events can dynamically change content.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
