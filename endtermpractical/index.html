 <!DOCTYPE html>
<html>
<head>
    <title>Largest Number Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            width: 350px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Largest Number Finder</h2>

    <input type="number" id="num1" placeholder="Enter first number"><br>
    <input type="number" id="num2" placeholder="Enter second number"><br>
    <input type="number" id="num3" placeholder="Enter third number"><br>
    <input type="number" id="num4" placeholder="Enter fourth number"><br>
    <input type="number" id="num5" placeholder="Enter fifth number"><br>


    

    <button onclick="findLargest()">Find Largest</button>

    <div id="result"></div>
</div>

<script>
function findLargest() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    let c = Number(document.getElementById("num3").value);
    let d = Number(document.getElementById("num4").value);
    let e = Number(document.getElementById("num5").value);

    let largest;

     

    if (a >= b && a >= c && a >= d && a >= e) {
        largest = a;
    }

    else if (b >= a && b >= c && b >= d && b >= e) {
        largest = b;
    }

    else if (c >= a && c >= b && c >= d && c >= e) {
        largest = c;
    }

    else if (d >= a && d >= b && d >= c && d >= e) {
        largest = d;
    }

    else {
        largest = e;
    }

     

    document.getElementById("result").innerHTML =
        "Largest Number: " + largest;
}
</script>

</body>
</html>
